<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSync — Smart Home</title>
  <meta name="theme-color" content="#080c10" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HomeSync" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080c10;
      --surface:   #0e1520;
      --border:    #1c2a3a;
      --accent:    #00e5ff;
      --accent2:   #ff3e6c;
      --green:     #00ffaa;
      --yellow:    #ffd400;
      --blue:      #3b8bff;
      --text:      #e2eaf4;
      --muted:     #4a6070;
      --font-mono: 'Space Mono', monospace;
      --font-ui:   'Syne', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      padding: 32px 24px;
      overflow-x: hidden;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    .dot.offline { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ─── SENSOR CARDS ─── */
    .sensors {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 600px) { .sensors { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s;
    }

    .card:hover { transform: translateY(-3px); border-color: var(--accent); }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.4;
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-icon {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .card-value {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .card-value.warning { color: var(--accent2); text-shadow: 0 0 12px var(--accent2); }
    .card-value.detected { color: var(--yellow); }

    /* ─── SECTION TITLE ─── */
    .section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ─── CONTROLS ─── */
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) { .controls-grid { grid-template-columns: 1fr; } }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.97); }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover::before { opacity: 0.07; }

    .btn-light  { border-color: rgba(255,212,0,0.4);  color: var(--yellow); }
    .btn-door   { border-color: rgba(59,139,255,0.4); color: var(--blue);   }
    .btn-light:hover  { background: rgba(255,212,0,0.08);  box-shadow: 0 0 20px rgba(255,212,0,0.15); }
    .btn-door:hover   { background: rgba(59,139,255,0.08); box-shadow: 0 0 20px rgba(59,139,255,0.15); }
    .btn-fan  { border-color: rgba(0,229,255,0.4); color: var(--accent); }
    .btn-fan:hover    { background: rgba(0,229,255,0.08);  box-shadow: 0 0 20px rgba(0,229,255,0.15); }

    /* ─── EMERGENCY ROW ─── */
    .emergency-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) { .emergency-row { grid-template-columns: 1fr; } }

    .btn-panic {
      background: rgba(255,62,108,0.1);
      border-color: rgba(255,62,108,0.5);
      color: var(--accent2);
      font-size: 16px;
      padding: 20px;
    }

    .btn-panic:hover {
      background: rgba(255,62,108,0.18);
      box-shadow: 0 0 30px rgba(255,62,108,0.25);
      border-color: var(--accent2);
    }

    .btn-reset {
      background: rgba(0,255,170,0.06);
      border-color: rgba(0,255,170,0.3);
      color: var(--green);
      font-size: 16px;
      padding: 20px;
    }

    .btn-reset:hover {
      background: rgba(0,255,170,0.12);
      box-shadow: 0 0 30px rgba(0,255,170,0.2);
      border-color: var(--green);
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 12px 22px;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── IP BADGE ─── */
    .ip-badge {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ip-badge label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .ip-badge input {
      flex: 1;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .ip-badge input:focus { border-color: var(--accent); }

    .ip-badge button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .ip-badge button:hover { opacity: 0.85; }

    /* ─── VOICE CONTROL ─── */
    .voice-section { margin-top: 28px; }

    .voice-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: rgba(0,229,255,0.06);
      color: var(--accent);
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }
    .mic-btn:hover {
      background: rgba(0,229,255,0.12);
      box-shadow: 0 0 24px rgba(0,229,255,0.2);
    }
    .mic-btn.listening {
      border-color: var(--accent2);
      background: rgba(255,62,108,0.12);
      color: var(--accent2);
      animation: mic-pulse 1.2s infinite;
    }
    .mic-btn.listening::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--accent2);
      opacity: 0;
      animation: mic-ring 1.2s infinite;
    }

    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,62,108,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(255,62,108,0); }
    }
    @keyframes mic-ring {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .voice-status {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: center;
    }
    .voice-status .heard {
      color: var(--accent);
      font-size: 14px;
      display: block;
      margin-top: 4px;
    }

    .voice-commands-hint {
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    @media (max-width: 500px) { .voice-commands-hint { grid-template-columns: 1fr; } }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .hint-item .phrase {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
    }

    .no-speech-warning {
      display: none;
      background: rgba(255,212,0,0.08);
      border: 1px solid rgba(255,212,0,0.3);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--yellow);
      text-align: center;
      width: 100%;
    }
    .card-value.fan-on  { color: var(--accent);  }
    .card-value.fan-off { color: var(--muted);   }
    .card-value.fan-emergency { color: var(--accent2); text-shadow: 0 0 12px var(--accent2); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .fan-spinning { display: inline-block; animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">Home<span>Sync</span></div>
    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">CONNECTING</span>
    </div>
  </header>

  <!-- Sensor Cards -->
  <p class="section-title">Live Sensors</p>
  <div class="sensors" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
    <div class="card">
      <div class="card-icon">🌡</div>
      <div class="card-label">Temperature</div>
      <div class="card-value" id="temp">--</div>
    </div>
    <div class="card">
      <div class="card-icon">💨</div>
      <div class="card-label">Gas Level</div>
      <div class="card-value" id="gas">--</div>
    </div>
    <div class="card">
      <div class="card-icon">🚶</div>
      <div class="card-label">Motion</div>
      <div class="card-value" id="motion">--</div>
    </div>
    <div class="card" id="fanCard">
      <div class="card-icon" id="fanIcon">🌀</div>
      <div class="card-label">Fan</div>
      <div class="card-value" id="fanStatus">--</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:6px;" id="fanReason"></div>
    </div>
  </div>

  <!-- Controls -->
  <p class="section-title">Controls</p>
  <div class="controls-grid">
    <button class="btn btn-light" onclick="send('/lighton',  '💡 Light turned ON')">💡 Light ON</button>
    <button class="btn btn-light" onclick="send('/lightoff', '💡 Light turned OFF')">💡 Light OFF</button>
    <button class="btn btn-door"  onclick="send('/dooropen', '🚪 Door opened')">🚪 Open Door</button>
    <button class="btn btn-door"  onclick="send('/doorclose','🚪 Door closed')">🚪 Close Door</button>
    <button class="btn btn-fan"   onclick="send('/fanon',  '🌀 Fan turned ON')">🌀 Fan ON</button>
    <button class="btn btn-fan"   onclick="send('/fanoff', '🌀 Fan turned OFF')">🌀 Fan OFF</button>
  </div>

  <!-- Emergency -->
  <p class="section-title" style="margin-top:20px">Emergency</p>
  <div class="emergency-row">
    <button class="btn btn-panic" onclick="send('/panic', '🚨 PANIC mode activated!')">🚨 PANIC</button>
    <button class="btn btn-reset" onclick="send('/reset', '✅ System reset')">✅ RESET</button>
  </div>

  <!-- Voice Control -->
  <div class="voice-section">
    <p class="section-title">Voice Control</p>
    <div class="voice-card">

      <div class="no-speech-warning" id="noSpeechWarning">
        ⚠️ Voice control requires Chrome or Edge browser
      </div>

      <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>

      <div class="voice-status">
        <span id="voiceStatusLabel">TAP MIC TO SPEAK</span>
        <span class="heard" id="heardText"></span>
      </div>

      <div class="voice-commands-hint">
        <div class="hint-item"><span class="phrase">"turn on the light"</span></div>
        <div class="hint-item"><span class="phrase">"turn off the light"</span></div>
        <div class="hint-item"><span class="phrase">"open the door"</span></div>
        <div class="hint-item"><span class="phrase">"close the door"</span></div>
        <div class="hint-item"><span class="phrase">"panic"</span></div>
        <div class="hint-item"><span class="phrase">"reset"</span></div>
      </div>

    </div>
  </div>

  <!-- PWA Install Button -->
  <div id="installBtn" style="display:none;margin-top:20px;justify-content:center;">
    <button onclick="installPWA()" style="
      display:flex;align-items:center;gap:10px;
      background:linear-gradient(135deg,#00e5ff22,#00ffaa22);
      border:1px solid var(--accent);
      border-radius:12px;
      padding:14px 28px;
      color:var(--accent);
      font-family:var(--font-ui);
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:all 0.2s;
    ">
      📲 Install HomeSync App
    </button>
  </div>

  <!-- IP input -->
  <div class="ip-badge">
    <label>ESP32 IP</label>
    <input type="text" id="ipInput" placeholder="192.168.x.x" />
    <button onclick="saveIP()">Save</button>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── IP Management ──────────────────────────────────────────────
  // Change this to your ESP32's IP (printed in Serial Monitor on boot)
  let espIP = localStorage.getItem("espIP") || "http://192.168.1.45";

  const ipInput = document.getElementById("ipInput");
  ipInput.value = espIP.replace(/^https?:\/\//, "");

  function saveIP() {
    const raw = ipInput.value.trim().replace(/^https?:\/\//, "");
    if (!raw) return;
    espIP = raw.startsWith("localhost") || /^\d+\.\d+\.\d+\.\d+/.test(raw) ? "http://" + raw : "https://" + raw;
    localStorage.setItem("espIP", espIP);
    showToast("✅ IP saved: " + raw);
  }

  // ── Send command ───────────────────────────────────────────────
  function send(route, label) {
    fetch(espIP + route)
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); })
      .then(() => showToast(label))
      .catch(() => showToast("❌ Could not reach ESP32"));
  }

  // ── Sensor polling ─────────────────────────────────────────────
  const dot        = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");

  function pollSensors() {
    fetch(espIP + "/data")
      .then(r => r.json())
      .then(data => {
        // Online indicator
        dot.classList.remove("offline");
        statusText.textContent = "ONLINE";

        // Temperature
        const tempEl = document.getElementById("temp");
        if (data.temperature === null || data.temperature === undefined) {
          tempEl.textContent = "ERR";
        } else {
          tempEl.textContent = data.temperature.toFixed(1) + " °C";
          tempEl.className   = "card-value";
        }

        // Gas level — flag if above threshold
        const gasEl = document.getElementById("gas");
        gasEl.textContent = data.gas;
        gasEl.className   = data.gas > 3500 ? "card-value warning" : "card-value";

        // Motion
        const motionEl = document.getElementById("motion");
        motionEl.textContent = data.motion ? "DETECTED" : "STILL";
        motionEl.className   = data.motion ? "card-value detected" : "card-value";

        // Fan status — mirrors Arduino logic exactly
        const fanEl     = document.getElementById("fanStatus");
        const fanIcon   = document.getElementById("fanIcon");
        const fanReason = document.getElementById("fanReason");

        if (data.gas > 3500) {
          // Gas emergency — fan ON
          fanEl.textContent   = "ON";
          fanEl.className     = "card-value fan-emergency";
          fanIcon.innerHTML   = "<span class='fan-spinning'>🌀</span>";
          fanReason.textContent = "GAS EMERGENCY";
        } else if (data.motion) {
          // Motion detected — fan ON
          fanEl.textContent   = "ON";
          fanEl.className     = "card-value fan-on";
          fanIcon.innerHTML   = "<span class='fan-spinning'>🌀</span>";
          fanReason.textContent = "MOTION DETECTED";
        } else {
          // No motion — fan OFF
          fanEl.textContent   = "OFF";
          fanEl.className     = "card-value fan-off";
          fanIcon.innerHTML   = "🌀";
          fanReason.textContent = "STANDBY";
        }
      })
      .catch(() => {
        dot.classList.add("offline");
        statusText.textContent = "OFFLINE";
      });
  }

  setInterval(pollSensors, 1000);
  pollSensors(); // immediate first fetch

  // ── Toast ──────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  // ── PWA Install ────────────────────────────────────────────────
  let deferredPrompt = null;

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("installBtn").style.display = "flex";
  });

  function installPWA() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById("installBtn").style.display = "none";
    });
  }

  // Register service worker for offline support
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }

  const micBtn           = document.getElementById("micBtn");
  const voiceStatusLabel = document.getElementById("voiceStatusLabel");
  const heardText        = document.getElementById("heardText");
  const noSpeechWarning  = document.getElementById("noSpeechWarning");

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    noSpeechWarning.style.display = "block";
    micBtn.style.opacity  = "0.3";
    micBtn.style.cursor   = "not-allowed";
    micBtn.onclick = null;
  }

  // Voice command map — add more phrases here anytime
  const COMMANDS = [
    { phrases: ["turn on the light", "light on", "lights on", "switch on the light"],   route: "/lighton",   label: "💡 Light turned ON"   },
    { phrases: ["turn off the light", "light off", "lights off", "switch off the light"],route: "/lightoff",  label: "💡 Light turned OFF"  },
    { phrases: ["open the door", "open door", "unlock the door", "unlock door"],         route: "/dooropen",  label: "🚪 Door opened"       },
    { phrases: ["close the door", "close door", "lock the door", "lock door"],           route: "/doorclose", label: "🚪 Door closed"       },
    { phrases: ["panic", "emergency", "help", "danger"],                                 route: "/panic",     label: "🚨 PANIC activated!"  },
    { phrases: ["reset", "reset system", "cancel panic", "all clear"],                   route: "/reset",     label: "✅ System reset"      },
  ];

  function matchCommand(transcript) {
    const lower = transcript.toLowerCase().trim();
    for (const cmd of COMMANDS) {
      for (const phrase of cmd.phrases) {
        if (lower.includes(phrase)) return cmd;
      }
    }
    return null;
  }

  let recognition = null;
  let isListening  = false;

  function toggleVoice() {
    if (!SpeechRecognition) return;
    isListening ? stopListening() : startListening();
  }

  function startListening() {
    recognition = new SpeechRecognition();
    recognition.lang            = "en-US";
    recognition.interimResults  = false;
    recognition.maxAlternatives = 3;

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add("listening");
      micBtn.textContent = "🔴";
      voiceStatusLabel.textContent = "LISTENING...";
      heardText.textContent = "";
    };

    recognition.onresult = (event) => {
      let matched = null;
      let bestTranscript = event.results[0][0].transcript;

      // Try each alternative until something matches
      for (let i = 0; i < event.results[0].length; i++) {
        matched = matchCommand(event.results[0][i].transcript);
        if (matched) break;
      }

      heardText.textContent = '"' + bestTranscript + '"';

      if (matched) {
        send(matched.route, matched.label);
        voiceStatusLabel.textContent = "COMMAND RECOGNISED";
      } else {
        voiceStatusLabel.textContent = "NOT RECOGNISED — TRY AGAIN";
        showToast("❓ Didn't catch that — try again");
      }
    };

    recognition.onerror = (event) => {
      if (event.error === "not-allowed") {
        showToast("🎤 Microphone access denied");
        voiceStatusLabel.textContent = "MIC ACCESS DENIED";
      } else if (event.error === "no-speech") {
        showToast("🔇 No speech detected");
        voiceStatusLabel.textContent = "NO SPEECH DETECTED";
      } else {
        voiceStatusLabel.textContent = "ERROR: " + event.error.toUpperCase();
      }
      stopListening();
    };

    recognition.onend = () => stopListening();
    recognition.start();
  }

  function stopListening() {
    isListening = false;
    micBtn.classList.remove("listening");
    micBtn.textContent = "🎤";
    if (recognition) { recognition.stop(); recognition = null; }
    if (voiceStatusLabel.textContent === "LISTENING...") {
      voiceStatusLabel.textContent = "TAP MIC TO SPEAK";
    }
  }
</script>
</body>
</html>
